<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spam Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      :root {
        --bg-deep: #090c1d;
        --bg-soft: #121b37;
        --card: rgba(15, 21, 43, 0.72);
        --stroke: rgba(146, 168, 255, 0.22);
        --text: #eef2ff;
        --muted: #9ba8d7;
        --accent: #7c8bff;
        --accent-2: #40d9b0;
        --danger: #ff6d98;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 10%, #1f2f66 0%, transparent 42%),
          radial-gradient(circle at 90% 10%, #3f1f66 0%, transparent 35%),
          radial-gradient(circle at 20% 90%, #0f5136 0%, transparent 28%),
          linear-gradient(140deg, var(--bg-deep), #0a1028 40%, #0d1d2f 100%);
      }

      .dashboard-wrap {
        width: min(1200px, 95vw);
        margin: 1.5rem auto;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: 1.1rem;
        backdrop-filter: blur(14px);
        box-shadow: 0 18px 35px rgba(6, 8, 22, 0.4);
      }

      .hero {
        padding: 1.6rem;
        background: linear-gradient(130deg, rgba(124, 139, 255, 0.25), rgba(64, 217, 176, 0.16));
      }

      .title {
        font-size: clamp(1.45rem, 2.8vw, 2.2rem);
        font-weight: 700;
        margin-bottom: 0.4rem;
      }

      .subtitle {
        color: #ccd6ff;
        margin-bottom: 0;
      }

      .quick-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
      }

      .btn-action {
        border-radius: 999px;
        border: 1px solid transparent;
        padding: 0.58rem 1rem;
        font-weight: 600;
      }

      .btn-gradient {
        background: linear-gradient(120deg, var(--accent), #9a80ff);
        color: #fff;
      }

      .btn-success-soft {
        background: linear-gradient(120deg, #24b588, var(--accent-2));
        color: #fff;
      }

      .btn-outline-soft {
        border-color: rgba(196, 206, 255, 0.3);
        color: #dbe3ff;
        background: rgba(150, 162, 228, 0.08);
      }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .stat-card {
        padding: 1rem;
      }

      .stat-label {
        font-size: 0.84rem;
        color: var(--muted);
        margin-bottom: 0.4rem;
      }

      .stat-value {
        font-size: clamp(1.3rem, 2.4vw, 1.9rem);
        font-weight: 700;
      }

      .status-box {
        border-radius: 0.8rem;
        border: 1px solid rgba(196, 206, 255, 0.24);
        background: rgba(139, 154, 224, 0.08);
        color: #e7ecff;
      }

      .content-grid {
        display: grid;
        grid-template-columns: 1.8fr 1fr;
        gap: 0.75rem;
      }

      .table-shell {
        overflow: auto;
      }

      table {
        color: var(--text) !important;
        margin-bottom: 0;
      }

      .table > :not(caption) > * > * {
        border-color: rgba(173, 189, 255, 0.18);
      }

      .badge-soft {
        padding: 0.42rem 0.6rem;
        border-radius: 999px;
        background: rgba(159, 173, 244, 0.18);
        color: #e6ecff;
        font-size: 0.74rem;
      }

      .risk {
        border-radius: 999px;
        padding: 0.3rem 0.65rem;
        font-weight: 600;
      }

      .risk-low { background: rgba(56, 212, 156, 0.2); color: #6cffcb; }
      .risk-medium { background: rgba(255, 195, 92, 0.19); color: #ffd685; }
      .risk-high { background: rgba(255, 109, 152, 0.2); color: #ff9dbc; }

      .keyword-list li { color: #d9e1ff; margin-bottom: 0.35rem; }

      @media (max-width: 991px) {
        .content-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 767px) {
        .dashboard-wrap { width: 94vw; margin: 1rem auto; }
        .hero { padding: 1.2rem; }
        .stat-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="dashboard-wrap">
      <section class="panel hero mb-3">
        <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3">
          <div>
            <h1 class="title">Spam Detection</h1>
            <p class="subtitle">A modern spam intelligence dashboard with instant email scanning, analytics, and threat insights.</p>
          </div>
          <div class="quick-actions">
            <button id="fetchBtn" class="btn btn-action btn-gradient">Fetch Emails</button>
            <button id="analyzeBtn" class="btn btn-action btn-success-soft">Analyze Messages</button>
            <button id="refreshModelBtn" class="btn btn-action btn-outline-soft">Reload Model</button>
            <button id="demoBtn" class="btn btn-action btn-outline-soft">Use Demo Data</button>
          </div>
        </div>
      </section>

      <section class="stat-grid mb-3">
        <article class="panel stat-card">
          <div class="stat-label">Total Emails</div>
          <div id="totalEmails" class="stat-value">0</div>
        </article>
        <article class="panel stat-card">
          <div class="stat-label">Spam Detected</div>
          <div id="spamCount" class="stat-value">0</div>
        </article>
        <article class="panel stat-card">
          <div class="stat-label">Spam Ratio</div>
          <div id="spamPct" class="stat-value">0%</div>
        </article>
      </section>

      <section class="content-grid">
        <article class="panel p-3">
          <div id="statusBox" class="status-box p-2 mb-3">Ready to fetch and analyze.</div>
          <div class="table-shell">
            <table class="table table-hover align-middle" id="emailsTable">
              <thead>
                <tr>
                  <th>Subject</th>
                  <th>Sender</th>
                  <th>AI Score</th>
                  <th>Risk</th>
                  <th>Signals</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </article>

        <aside class="d-flex flex-column gap-3">
          <article class="panel p-3">
            <h5 class="mb-3">Threat Distribution</h5>
            <canvas id="pieChart" width="300" height="300"></canvas>
          </article>
          <article class="panel p-3">
            <h6 class="mb-3">Top Spam Keywords</h6>
            <ul id="topKeywords" class="keyword-list mb-0 ps-3"></ul>
          </article>
        </aside>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      let emails = [];
      let pieChart = null;

      const fetchBtn = document.getElementById('fetchBtn');
      const analyzeBtn = document.getElementById('analyzeBtn');
      const refreshModelBtn = document.getElementById('refreshModelBtn');
      const demoBtn = document.getElementById('demoBtn');
      const statusBox = document.getElementById('statusBox');
      const tbody = document.querySelector('#emailsTable tbody');
      const pieCtx = document.getElementById('pieChart').getContext('2d');

      const FALLBACK_STORED_EMAILS = [
        { subject: 'Free gift card waiting for you', sender: 'promo@offers-win.example', date: '2026-02-20', body: 'Congratulations winner. Click urgent link to claim your free reward now.' },
        { subject: 'Weekly project update', sender: 'manager@company.com', date: '2026-02-21', body: 'Please share sprint updates before tomorrow meeting.' },
        { subject: 'Account verification required', sender: 'security@unknown-pay.example', date: '2026-02-22', body: 'Your account is blocked. Verify password and otp immediately.' },
        { subject: 'Team lunch plan', sender: 'teammate@example.com', date: '2026-02-23', body: 'Let us meet for team lunch this Friday.' }
      ];
      const SPAM_TERMS = ['free', 'winner', 'won', 'lottery', 'urgent', 'verify', 'otp', 'password', 'claim', 'gift', 'suspended', 'click'];

      const setStatus = (message, type = 'info') => {
        const palette = {
          info: ['rgba(139, 154, 224, 0.08)', 'rgba(196, 206, 255, 0.24)'],
          success: ['rgba(64, 217, 176, 0.1)', 'rgba(64, 217, 176, 0.34)'],
          warning: ['rgba(255, 195, 92, 0.12)', 'rgba(255, 195, 92, 0.34)'],
          danger: ['rgba(255, 109, 152, 0.12)', 'rgba(255, 109, 152, 0.34)']
        };
        const [bg, border] = palette[type] || palette.info;
        statusBox.style.background = bg;
        statusBox.style.borderColor = border;
        statusBox.textContent = message;
      };

      fetchBtn.onclick = async () => {
        setStatus('Fetching emails...', 'info');
        try {
          const res = await fetch('/fetch-emails');
          const data = await res.json();
          emails = data.emails || [];
          renderEmails([]);
          setStatus(`Fetched ${emails.length} email(s).`, 'success');
          document.getElementById('totalEmails').textContent = emails.length;
        } catch (e) {
          emails = [...FALLBACK_STORED_EMAILS];
          renderEmails([]);
          document.getElementById('totalEmails').textContent = emails.length;
          setStatus('Backend not reachable. Loaded demo emails.', 'warning');
        }
      };

      analyzeBtn.onclick = async () => {
        if (!emails.length) {
          setStatus('Please fetch emails first.', 'warning');
          return;
        }

        setStatus('Running AI analysis...', 'info');
        try {
          const analyzeRes = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ emails })
          });
          const data = await analyzeRes.json();

          if (!analyzeRes.ok) {
            setStatus(data.error || 'Analysis failed.', 'danger');
            return;
          }

          const results = data.results || [];
          const summary = data.summary || {};
          renderEmails(results);
          renderAnalytics(summary);
          setStatus('Analysis complete.', 'success');
        } catch (e) {
          const local = analyzeLocally(emails);
          renderEmails(local.results);
          renderAnalytics(local.summary);
          setStatus('Backend unavailable. Completed local rule-based analysis.', 'warning');
        }
      };

      refreshModelBtn.onclick = async () => {
        setStatus('Reloading model...', 'info');
        try {
          const res = await fetch('/reload-model', { method: 'POST' });
          const data = await res.json();
          setStatus(data.message || 'Model reloaded.', res.ok ? 'success' : 'danger');
        } catch (e) {
          setStatus('Unable to reload model.', 'danger');
        }
      };

      demoBtn.onclick = async () => {
        setStatus('Loading stored demo emails...', 'info');
        try {
          const res = await fetch('/static/stored_emails.json');
          const data = await res.json();
          emails = Array.isArray(data) ? data : FALLBACK_STORED_EMAILS;
        } catch (e) {
          emails = [...FALLBACK_STORED_EMAILS];
        }

        renderEmails([]);
        document.getElementById('totalEmails').textContent = emails.length;
        setStatus(`Demo mode ready: loaded ${emails.length} email(s). Click Analyze Messages next.`, 'success');
      };

      function renderEmails(results) {
        tbody.innerHTML = '';
        if (!results.length) {
          emails.forEach((e) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${escapeHtml(e.subject || '')}</td><td>${escapeHtml(e.sender || '')}</td><td>—</td><td>—</td><td>—</td>`;
            tbody.appendChild(tr);
          });
          return;
        }

        results.forEach((r) => {
          const tr = document.createElement('tr');
          const pct = `${Math.round((r.probability || 0) * 100)}%`;
          const riskClass = r.risk === 'high' ? 'risk-high' : r.risk === 'medium' ? 'risk-medium' : 'risk-low';
          const suspicious = (r.suspicious_words || [])
            .map((w) => `<span class="badge-soft me-1">${escapeHtml(w)}</span>`)
            .join('');
          tr.innerHTML = `<td>${escapeHtml(r.subject || '')}</td><td>${escapeHtml(r.sender || '')}</td><td>${pct}</td><td><span class="risk ${riskClass}">${escapeHtml(r.risk || 'unknown')}</span></td><td>${suspicious}</td>`;
          tbody.appendChild(tr);
        });
      }

      function analyzeLocally(localEmails) {
        const results = localEmails.map((email) => {
          const text = `${email.subject || ''} ${email.body || ''} ${email.snippet || ''}`.toLowerCase();
          const hits = SPAM_TERMS.filter((term) => text.includes(term));
          const probability = Math.min(0.95, 0.15 + hits.length * 0.12);
          const label = probability >= 0.5 ? 'spam' : 'not_spam';
          const risk = probability < 0.3 ? 'low' : probability < 0.7 ? 'medium' : 'high';
          return {
            subject: email.subject || '(No Subject)',
            sender: email.sender || 'Unknown Sender',
            date: email.date || '',
            label,
            probability: Number(probability.toFixed(4)),
            risk,
            suspicious_words: hits.slice(0, 6)
          };
        });

        return {
          results,
          summary: {
            total_emails: results.length,
            spam_count: results.filter((r) => r.label === 'spam').length,
            spam_percentage: results.length ? Number(((results.filter((r) => r.label === 'spam').length / results.length) * 100).toFixed(2)) : 0,
            top_keywords: Object.entries(
              results.flatMap((r) => r.suspicious_words).reduce((acc, key) => {
                acc[key] = (acc[key] || 0) + 1;
                return acc;
              }, {})
            ).sort((a, b) => b[1] - a[1]).slice(0, 10)
          }
        };
      }

      function renderAnalytics(stats) {
        const total = Number(stats.total_emails || 0);
        const spam = Number(stats.spam_count || 0);
        const notspam = Math.max(total - spam, 0);
        const top = stats.top_keywords || [];

        document.getElementById('totalEmails').textContent = total;
        document.getElementById('spamCount').textContent = spam;
        document.getElementById('spamPct').textContent = `${stats.spam_percentage || 0}%`;
        document.getElementById('topKeywords').innerHTML = top.length
          ? top.map((t) => `<li>${escapeHtml(t[0])} (${t[1]})</li>`).join('')
          : '<li class="text-muted">No keywords yet.</li>';

        if (pieChart) pieChart.destroy();
        pieChart = new Chart(pieCtx, {
          type: 'doughnut',
          data: {
            labels: ['Not Spam', 'Spam'],
            datasets: [{ data: [notspam, spam], backgroundColor: ['#40d9b0', '#ff6d98'], borderWidth: 0 }]
          },
          options: {
            plugins: { legend: { position: 'bottom', labels: { color: '#dfe6ff' } } }
          }
        });
      }

      function escapeHtml(text) {
        return (text || '').replace(/[&"'<>]/g, (c) => ({ '&': '&amp;', '"': '&quot;', "'": '&#39;', '<': '&lt;', '>': '&gt;' }[c]));
      }
    </script>
  </body>
</html>
