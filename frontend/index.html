<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Gmail Spam Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f2f6ff 0%, #f8f3ff 40%, #ebf9f5 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 16px;
        box-shadow: 0 12px 28px rgba(24, 32, 79, 0.08);
      }
      .brand-chip {
        background: #161f45;
        color: #fff;
        border-radius: 999px;
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .table td,
      .table th {
        vertical-align: middle;
      }
      .score-pill {
        font-weight: 600;
      }
    </style>
  </head>
  <body class="p-3 p-md-4">
    <div class="container-xl">
      <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between mb-3 gap-3">
        <div>
          <span class="brand-chip">AI Security Suite</span>
          <h1 class="mt-2 mb-1">Gmail Spam Detector</h1>
          <p class="text-muted mb-0">Production-ready inbox threat screening with explainable AI scoring.</p>
        </div>
        <div class="d-flex gap-2">
          <a href="/login" class="btn btn-outline-primary">Login with Google</a>
          <button id="logoutBtn" class="btn btn-outline-secondary">Logout</button>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-12 col-md-4">
          <div class="glass-card p-3 h-100">
            <h6 class="text-muted mb-2">Total Emails</h6>
            <h3 id="totalEmails">0</h3>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="glass-card p-3 h-100">
            <h6 class="text-muted mb-2">Spam Detected</h6>
            <h3 id="spamCount">0</h3>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="glass-card p-3 h-100">
            <h6 class="text-muted mb-2">Spam Ratio</h6>
            <h3><span id="spamPct">0%</span></h3>
          </div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-8">
          <div class="glass-card p-3">
            <div class="d-flex flex-wrap gap-2 mb-3">
              <button id="fetchBtn" class="btn btn-primary">1) Fetch Emails</button>
              <button id="analyzeBtn" class="btn btn-success">2) Analyze with AI</button>
              <button id="refreshModelBtn" class="btn btn-outline-dark">Reload Model</button>
            </div>
            <div id="statusBox" class="alert alert-info py-2">Ready.</div>
            <div class="table-responsive">
              <table class="table table-hover" id="emailsTable">
                <thead>
                  <tr>
                    <th>Subject</th>
                    <th>Sender</th>
                    <th>AI Score</th>
                    <th>Risk</th>
                    <th>Signals</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="glass-card p-3 mb-3">
            <h5>Threat Distribution</h5>
            <canvas id="pieChart" width="300" height="300"></canvas>
          </div>
          <div class="glass-card p-3">
            <h6>Top Spam Keywords</h6>
            <ul id="topKeywords" class="mb-0"></ul>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      let emails = [];
      let pieChart = null;

      const fetchBtn = document.getElementById('fetchBtn');
      const analyzeBtn = document.getElementById('analyzeBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const refreshModelBtn = document.getElementById('refreshModelBtn');
      const statusBox = document.getElementById('statusBox');
      const tbody = document.querySelector('#emailsTable tbody');
      const pieCtx = document.getElementById('pieChart').getContext('2d');

      const setStatus = (message, type = 'info') => {
        statusBox.className = `alert alert-${type} py-2`;
        statusBox.textContent = message;
      };

      fetchBtn.onclick = async () => {
        setStatus('Fetching emails...', 'info');
        try {
          const res = await fetch('/fetch-emails');
          const data = await res.json();
          emails = data.emails || [];
          renderEmails([]);
          setStatus(`Fetched ${emails.length} email(s).`, 'success');
          document.getElementById('totalEmails').textContent = emails.length;
        } catch (e) {
          setStatus('Unable to fetch emails. Check backend.', 'danger');
        }
      };

      analyzeBtn.onclick = async () => {
        if (!emails.length) {
          setStatus('Please fetch emails first.', 'warning');
          return;
        }

        setStatus('Running AI analysis...', 'info');
        try {
          const analyzeRes = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ emails })
          });
          const data = await analyzeRes.json();

          if (!analyzeRes.ok) {
            setStatus(data.error || 'Analysis failed.', 'danger');
            return;
          }

          const results = data.results || [];
          const summary = data.summary || {};
          renderEmails(results);
          renderAnalytics(summary);
          setStatus('Analysis complete.', 'success');
        } catch (e) {
          setStatus('Unable to analyze emails.', 'danger');
        }
      };

      refreshModelBtn.onclick = async () => {
        setStatus('Reloading model...', 'info');
        try {
          const res = await fetch('/reload-model', { method: 'POST' });
          const data = await res.json();
          setStatus(data.message || 'Model reloaded.', res.ok ? 'success' : 'danger');
        } catch (e) {
          setStatus('Unable to reload model.', 'danger');
        }
      };

      logoutBtn.onclick = async () => {
        await fetch('/logout');
        setStatus('Logged out and token removed.', 'secondary');
      };

      function renderEmails(results) {
        tbody.innerHTML = '';
        if (!results.length) {
          emails.forEach((e) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${escapeHtml(e.subject || '')}</td><td>${escapeHtml(e.sender || '')}</td><td>—</td><td>—</td><td>—</td>`;
            tbody.appendChild(tr);
          });
          return;
        }

        results.forEach((r) => {
          const tr = document.createElement('tr');
          const pct = `${Math.round((r.probability || 0) * 100)}%`;
          const badgeClass = r.risk === 'high' ? 'danger' : r.risk === 'medium' ? 'warning' : 'success';
          const suspicious = (r.suspicious_words || [])
            .map((w) => `<span class="badge bg-secondary me-1">${escapeHtml(w)}</span>`)
            .join('');
          tr.innerHTML = `<td>${escapeHtml(r.subject || '')}</td><td>${escapeHtml(r.sender || '')}</td><td><span class="score-pill">${pct}</span></td><td><span class="badge bg-${badgeClass}">${escapeHtml(r.risk || 'unknown')}</span></td><td>${suspicious}</td>`;
          tbody.appendChild(tr);
        });
      }

      function renderAnalytics(stats) {
        const total = Number(stats.total_emails || 0);
        const spam = Number(stats.spam_count || 0);
        const notspam = Math.max(total - spam, 0);
        const top = stats.top_keywords || [];

        document.getElementById('totalEmails').textContent = total;
        document.getElementById('spamCount').textContent = spam;
        document.getElementById('spamPct').textContent = `${stats.spam_percentage || 0}%`;
        document.getElementById('topKeywords').innerHTML = top.length
          ? top.map((t) => `<li>${escapeHtml(t[0])} (${t[1]})</li>`).join('')
          : '<li class="text-muted">No keywords yet.</li>';

        if (pieChart) pieChart.destroy();
        pieChart = new Chart(pieCtx, {
          type: 'doughnut',
          data: {
            labels: ['Not Spam', 'Spam'],
            datasets: [{ data: [notspam, spam], backgroundColor: ['#3ecf8e', '#f04e65'] }]
          },
          options: { plugins: { legend: { position: 'bottom' } } }
        });
      }

      function escapeHtml(text) {
        return (text || '').replace(/[&"'<>]/g, (c) => ({ '&': '&amp;', '"': '&quot;', "'": '&#39;', '<': '&lt;', '>': '&gt;' }[c]));
      }
    </script>
  </body>
</html>
